services:
  vllm:
    image: ${VLLM_IMAGE}
    restart: unless-stopped
    ipc: host
    gpus: all
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --model
      - ${VLLM_MODEL}
      - --served-model-name
      - ${VLLM_MODEL}
      - --max-model-len
      - ${VLLM_MAX_MODEL_LEN}
      - --gpu-memory-utilization
      - "0.95"
      - --max-num-seqs
      - "1"
      - --kv-cache-dtype
      - fp8
      - --limit-mm-per-prompt
      - '{"image": 1, "audio": 0}'
      - --speculative-config
      - ${VLLM_SPECULATIVE_CONFIG}
      - --trust-remote-code
      - --enable-auto-tool-choice
      - --tool-call-parser
      - gemma4
      - --reasoning-parser
      - gemma4
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN}
      HF_HOME: /root/.cache/huggingface
    volumes:
      - ./data/hf-cache:/root/.cache/huggingface
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/health\", timeout=5)'"]
      interval: 30s
      timeout: 10s
      retries: 20

  coder-postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: coder
      POSTGRES_PASSWORD: ${CODER_POSTGRES_PASSWORD}
      POSTGRES_DB: coder
    volumes:
      - coder-postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coder -d coder"]
      interval: 10s
      timeout: 5s
      retries: 12

  coder:
    image: ${CODER_IMAGE}
    restart: unless-stopped
    network_mode: host
    group_add:
      - ${DOCKER_GID}
    depends_on:
      coder-postgres:
        condition: service_healthy
      vllm:
        condition: service_started
    environment:
      CODER_ACCESS_URL: http://localhost:7080
      CODER_HTTP_ADDRESS: 0.0.0.0:7080
      CODER_PG_CONNECTION_URL: postgres://coder:${CODER_POSTGRES_PASSWORD}@127.0.0.1:5432/coder?sslmode=disable
      CODER_TELEMETRY_ENABLE: "false"
      CODER_DERP_SERVER_ENABLE: "true"
      CODER_DISABLE_PASSWORD_AUTH: "false"
      CODER_PROMETHEUS_ENABLE: "false"
      OPENAI_API_BASE_URL: http://127.0.0.1:8000/v1
      VLLM_MODEL: ${VLLM_MODEL}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./coder-template:/opt/coder-template:ro
      - ./data/coder:/home/coder/.config

volumes:
  coder-postgres:
